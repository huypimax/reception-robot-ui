version: "3.1"

rules:

- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Say 'I am a bot' anytime the user challenges
  steps:
  - intent: bot_challenge
  - action: utter_iamabot

- rule: Greeting
  steps:
    - intent: greet
    - action: utter_greet

- rule: Ask school info
  steps:
    - intent: ask_school
    - action: utter_ask_school

- rule: response to weather questions
  steps:
    - intent: ask_weather
    - action: action_get_weather

